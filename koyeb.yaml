# Deploy with: koyeb deploy --archive . --config koyeb.yaml
# (or connect the GitHub repo directly in the Koyeb dashboard and it will
# auto-detect the Dockerfile — this file is for CLI/IaC deploys)
name: musicianlearner-basic-pitch
services:
  - name: api
    instance_type: free
    ports:
      - port: 8000
        protocol: http
    routes:
      - path: /
        port: 8000
    health_checks:
      - http:
          path: /health
          port: 8000
    env:
      - key: PORT
        value: "8000"
      # Koyeb's free (Eco) tier is also 512MB RAM -- same constraint as
      # Render, measured empirically. Serialize requests.
      - key: MAX_WORKERS
        value: "1"
    scaling:
      min: 0
      max: 1
